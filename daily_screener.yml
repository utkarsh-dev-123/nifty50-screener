name: Daily Nifty 50 Stock Screener

on:
  schedule:
    # Runs at 8:00 AM IST = 2:30 AM UTC, Mon–Fri
    - cron: "30 2 * * 1-5"
  workflow_dispatch:   # lets you trigger manually from GitHub UI any time

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # suppresses Node.js deprecation warning

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python screener.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Daily screener update — $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
