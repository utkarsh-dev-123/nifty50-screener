name: Daily Nifty 500 Screen

on:
  schedule:
    - cron: "30 3 * * 1-5"   # 9:00 AM IST (UTC+5:30) on weekdays
  workflow_dispatch:           # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore listing date cache
        uses: actions/cache@v4
        with:
          path: listing_cache.json
          key: listing-cache-${{ runner.os }}
          restore-keys: |
            listing-cache-

      - run: pip install -r requirements.txt

      - run: python daily_screen.py
        # No GEMINI_API_KEY needed — daily_screen.py does not call Gemini.

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet && echo "Nothing to commit" || \
          git commit -m "screen: update data.json $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
